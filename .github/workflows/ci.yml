name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only needs to read the repo. No secrets are used.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pipx install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.0", "5.1", "5.2"]
        exclude:
          # Django 4.2 / 5.0 do not support Python 3.13.
          - { python-version: "3.13", django: "4.2" }
          - { python-version: "3.13", django: "5.0" }

    name: py${{ matrix.python-version }} / django${{ matrix.django }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + test deps + pinned Django
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" "Django~=${{ matrix.django }}.0"

      - name: Show versions
        run: python -c "import django, sys; print('Python', sys.version); print('Django', django.get_version())"

      - name: Run tests
        run: python -m pytest -q

  # Smoke-test that the example project's mount validates and the SPA actually builds.
  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: example/frontend/package-lock.json
      - name: Build the SPA
        working-directory: example/frontend
        run: |
          npm ci
          npm run build
      - name: Install package + Django
        run: python -m pip install -e . Django
      - name: Django system check
        working-directory: example
        run: python manage.py check
